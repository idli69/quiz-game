<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main class="container">
      <!-- START SCREEN -->
      <section class="screen active" id="start-screen">
        <h1>Quiz Time!</h1>
        <p>Test your knowledge with these fun questions</p>
        <button id="start-btn">Start Quiz</button>
      </section>

      <!-- QUIZ SCREEN -->
      <section class="screen" id="quiz-screen">
        <header class="quiz-header">
          <h2 id="question-text">Question...</h2>

          <div class="quiz-info">
            <p>
              Question
              <span id="current-question">1</span>
              of
              <span id="total-questions">5</span>
            </p>

            <p>Score: <span id="score">0</span></p>
          </div>
        </header>

        <!-- ANSWERS -->
        <section id="answers-container" class="answers-container"></section>

        <!-- PROGRESS -->
        <div class="progress-container" aria-label="quiz progress">
          <div id="progress" class="progress-bar"></div>
        </div>
      </section>

      <!-- RESULT SCREEN -->
      <section class="screen" id="result-screen">
        <h1>Quiz Results</h1>

        <div class="result-info">
          <p>
            You scored
            <span id="final-score">0</span>
            out of
            <span id="max-score">5</span>
          </p>

          <div id="result-message">Good job!</div>
        </div>

        <button id="restart-btn">Restart Quiz</button>
      </section>
    </main>

    <script type="module" src="script.js"></script>
  </body>
</html>
